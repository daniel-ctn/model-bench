<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="ModelBench">
<title>ModelBench</title><style>
@keyframes mb-draw{from{stroke-dashoffset:var(--mb-len)}to{stroke-dashoffset:0}}
@keyframes mb-node-in{0%{opacity:0;transform:scale(.2)}60%{opacity:1}100%{opacity:1;transform:scale(1)}}
.mb-m{--mb-len:64;stroke-dasharray:64}
.mb-bench{--mb-len:22;stroke-dasharray:22}
.mb-tick{--mb-len:7;stroke-dasharray:7}
@media (prefers-reduced-motion: no-preference){
 .mb-m{animation:mb-draw .9s cubic-bezier(.5,.15,.2,1) .05s both}
 .mb-bench{animation:mb-draw .5s ease-out both}
 .mb-tick{animation:mb-draw .4s ease-out .72s both}
 .mb-node{transform-box:fill-box;transform-origin:center;animation:mb-node-in .5s cubic-bezier(.34,1.4,.5,1) .98s both}
}</style>
<rect width="32" height="32" rx="7.5" fill="#976ef1"/>
<path class="mb-m" d="M6 24 V6.5 L16 16.8 L26 6.5 V24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
<path class="mb-bench" d="M5.4 24 H26.6" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
<path class="mb-tick" d="M16 16.4 V11.6" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
<circle class="mb-node" cx="16" cy="9.2" r="2.1" fill="#ffffff"/>
</svg>
